name: Rebuild research index

on:
  schedule:
    - cron: "30 14 * * 0" # Sundays, after the weekly research pass
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rebuild-index
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Tests
        run: python3 -m pip install -q "pytest==8.3.4" && python3 -m pytest tests/ -q
      - name: Rebuild index
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 bin/build_index.py
      - name: Commit if changed
        run: |
          if ! git diff --quiet -- index.md feed.xml; then
            git config user.name "research-index-bot"
            git config user.email "actions@users.noreply.github.com"
            git add index.md feed.xml
            git commit -m "chore: rebuild research index"
            git pull --rebase origin main
            git push
          else
            echo "index unchanged"
          fi
