name: Rebuild research index

on:
  schedule:
    - cron: "30 14 * * 0" # Sundays, after the weekly research pass
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Tests
        run: python3 -m pip install -q pytest && python3 -m pytest tests/ -q
      - name: Rebuild index
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 bin/build_index.py
      - name: Commit if changed
        run: |
          if ! git diff --quiet index.md; then
            git config user.name "research-index-bot"
            git config user.email "actions@users.noreply.github.com"
            git add index.md
            git commit -m "chore: rebuild research index"
            git push
          else
            echo "index unchanged"
          fi
