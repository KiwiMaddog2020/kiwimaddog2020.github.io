name: Tests

# Runs on PRs and manual dispatch only — NOT on push to main. On this GitHub Pages user
# repo, every push also starts the mandatory "pages build and deployment", and the free
# concurrent-job cap cancels this workflow when both race. Per-commit gating for the
# push-to-main flow is handled locally by the .githooks/pre-commit quiz-quality guard;
# the weekly "Rebuild research index" workflow also runs the full suite as a backstop.
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Run tests (includes quiz-quality regression guard)
        run: python3 -m pip install -q "pytest==8.3.4" && python3 -m pytest tests/ -q
